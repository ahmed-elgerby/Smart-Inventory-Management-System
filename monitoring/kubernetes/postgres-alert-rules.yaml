apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: postgres-alerts
  labels:
    release: monitoring
spec:
  groups:
    - name: postgres.rules
      rules:
        - alert: PostgresDown
          expr: pg_up == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: PostgreSQL is down
            description: postgres-exporter cannot connect to the inventory database.
        - alert: PostgresHighConnections
          expr: pg_stat_database_numbackends{datname="inventory"} > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: PostgreSQL has high active connections
            description: Inventory database has {{ $value }} active connections.
        - alert: PostgresDeadlocks
          expr: increase(pg_stat_database_deadlocks{datname="inventory"}[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: PostgreSQL deadlock detected
            description: The inventory database reported one or more deadlocks in the last 5 minutes.
