global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: inventory-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:5000

  - job_name: inventory-alert-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - alert-service:5001

  - job_name: inventory-reporting-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - reporting-service:5002

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
