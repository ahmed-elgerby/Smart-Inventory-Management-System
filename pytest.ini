[tool:pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --junit-xml=test-results.xml
    --cov
    --cov-report=xml
    --cov-report=html
    --cov-report=term
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
junit_family = xunit2