apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: reporting-service
  name: reporting-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reporting-service
  strategy: 
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
      - image: ahmedilgerby/inventory_reporting_service:latest
        name: inventory-reporting-service
        env:
        - name: DB_HOST
          value: "db-service"
        - name: DB_NAME
          value: "inventory"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_PORT
          value: "5432"
        ports:
        - containerPort: 5002


