apiVersion: apps/v1
kind: Deployment
metadata:
  name: FE
spec:
  replicas: 2
  selector:
    matchLabels:
      component: fe
  template:
    metadata:
      labels:
        component: fe
    spec:
      containers:
        - name: FE
          image: ahmedelgerby/inventory-frontend:latest
          ports:
            - containerPort: 80
