services:

  db:
    build:
       context:  ./DB
       tags:
         - ahmedilgerby/inventory_db    
    container_name: Our_DB
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: 
       context: ./backend
       tags:
         - ahmedilgerby/inventory_be
    container_name: BE
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inventory
    depends_on:
      db:
        condition: service_healthy
      alert-service:
        condition: service_started
      reporting-service:
        condition: service_started
    ports:
      - "5000:5000"
    volumes:
      - ./backend/test_backend.py:/app/test_backend.py:ro
      - ./backend/conftest.py:/app/conftest.py:ro
    restart: unless-stopped

  alert-service:
    build: 
       context: ./alert-service
       tags:
         - ahmedilgerby/inventory_alert_service
    container_name: alert-service
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inventory
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5001"
    restart: unless-stopped

  reporting-service:
    build: 
       context: ./reporting-service
       tags:
         - ahmedilgerby/inventory_reporting_service
    container_name: reporting-service
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inventory
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5002:5002"
    restart: unless-stopped

  nginx:
    build: 
       context: ./FrontEnd
       tags:
         - ahmedelgerby/inventory_frontend
    container_name: FE
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped


volumes:
  pg_data:
