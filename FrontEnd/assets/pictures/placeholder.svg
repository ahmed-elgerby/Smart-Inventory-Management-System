<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#grad)"/>
  <g transform="translate(200, 200)">
    <!-- Image frame -->
    <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <!-- Mountain/Image icon -->
    <path d="M -60 -30 L -20 20 L 20 -10 L 60 30" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Circle (sun) -->
    <circle cx="-40" cy="-50" r="12" fill="#fbbf24" stroke="#fbbf24" stroke-width="2"/>
  </g>
  <!-- Text -->
  <text x="200" y="350" text-anchor="middle" fill="#94a3b8" font-size="18" font-weight="500" font-family="system-ui, sans-serif">
    No Image Available
  </text>
</svg>
