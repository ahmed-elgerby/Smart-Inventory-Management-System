    /* ═══════════════════════════════════════
       REPORTS PAGE — logs + PDF export
    ═══════════════════════════════════════ */
    function ReportsPage() {
        const [tab, setTab] = useState('logs');
        const [logs, setLogs] = useState([]);
        const [logsLoading, setLogsLoading] = useState(false);
        const [logDays, setLogDays] = useState(30);
        const [pdfLoading, setPdfLoading] = useState(false);
        const [reportData, setReportData] = useState(null);
        const [reportLoading, setReportLoading] = useState(false);
        const [error, setError] = useState('');

        const loadLogs = async (days) => {
            setLogsLoading(true); setError('');
            try { const d = await api.getActivityLog(days); setLogs(d.log_entries || []); }
            catch (e) { setError('Could not load activity logs. Make sure the reporting service is running on port 5002.'); setLogs([]); }
            finally { setLogsLoading(false); }
        };

        const loadReport = async () => {
            setReportLoading(true); setError('');
            try { const d = await api.getComprehensiveReport(); setReportData(d); }
            catch (e) { setError('Could not load report data. Make sure the reporting service is running on port 5002.'); }
            finally { setReportLoading(false); }
        };

        useEffect(() => { if (tab==='logs') loadLogs(logDays); if (tab==='pdf') loadReport(); }, [tab]);

        const generatePDF = async () => {
            setPdfLoading(true);
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
                const pd = reportData || await api.getComprehensiveReport().catch(()=>null);

                // Header
                doc.setFillColor(10,14,39);
                doc.rect(0,0,210,40,'F');
                doc.setTextColor(96,165,250);
                doc.setFontSize(22); doc.setFont('helvetica','bold');
                doc.text('INVENTORY MANAGEMENT REPORT', 105, 20, {align:'center'});
                doc.setFontSize(10); doc.setFont('helvetica','normal');
                doc.setTextColor(200,210,220);
                doc.text(`Generated: ${new Date().toLocaleString()}`, 105, 32, {align:'center'});

                let y = 50;

                if (pd) {
                    const inv = pd.inventory_overview || {};
                    const al  = pd.alerts_overview   || {};
                    const usr = pd.users_overview    || {};

                    // Inventory overview
                    doc.setTextColor(34,211,238); doc.setFontSize(13); doc.setFont('helvetica','bold');
                    doc.text('INVENTORY OVERVIEW', 14, y); y += 8;
                    doc.autoTable({
                        startY: y,
                        head:[['Metric','Value']],
                        body:[
                            ['Total Items', inv.total_items || '—'],
                            ['Total Quantity', inv.total_qty || '—'],
                            ['Total Value', inv.total_value ? `$${parseFloat(inv.total_value).toFixed(2)}` : '—'],
                            ['Out of Stock', inv.out_of_stock || '—'],
                            ['Low Stock', inv.low_stock || '—'],
                        ],
                        headStyles:{fillColor:[10,14,39],textColor:[96,165,250]},
                        alternateRowStyles:{fillColor:[20,30,50]},
                        styles:{textColor:[200,210,220],fontSize:10},
                        margin:{left:14,right:14},
                    });
                    y = doc.lastAutoTable.finalY + 12;

                    // Alerts overview
                    doc.setTextColor(34,211,238); doc.setFontSize(13); doc.setFont('helvetica','bold');
                    doc.text('ALERTS OVERVIEW', 14, y); y += 8;
                    doc.autoTable({
                        startY: y,
                        head:[['Metric','Value']],
                        body:[
                            ['Total Alerts', al.total_alerts || '—'],
                            ['Active',  al.active  || '—'],
                            ['Resolved',al.resolved || '—'],
                        ],
                        headStyles:{fillColor:[10,14,39],textColor:[96,165,250]},
                        alternateRowStyles:{fillColor:[20,30,50]},
                        styles:{textColor:[200,210,220],fontSize:10},
                        margin:{left:14,right:14},
                    });
                    y = doc.lastAutoTable.finalY + 12;

                    // Users overview
                    doc.setTextColor(34,211,238); doc.setFontSize(13); doc.setFont('helvetica','bold');
                    doc.text('USERS OVERVIEW', 14, y); y += 8;
                    doc.autoTable({
                        startY: y,
                        head:[['Role','Count']],
                        body:[
                            ['Admins',   usr.admins || '—'],
                            ['Managers', usr.managers || '—'],
                            ['Employees',usr.employees || '—'],
                            ['Total',    usr.total_users || '—'],
                        ],
                        headStyles:{fillColor:[10,14,39],textColor:[96,165,250]},
                        alternateRowStyles:{fillColor:[20,30,50]},
                        styles:{textColor:[200,210,220],fontSize:10},
                        margin:{left:14,right:14},
                    });
                    y = doc.lastAutoTable.finalY + 12;

                    // Top categories
                    if (pd.top_categories && pd.top_categories.length > 0) {
                        if (y > 230) { doc.addPage(); y = 20; }
                        doc.setTextColor(34,211,238); doc.setFontSize(13); doc.setFont('helvetica','bold');
                        doc.text('TOP CATEGORIES BY VALUE', 14, y); y += 8;
                        doc.autoTable({
                            startY: y,
                            head:[['Category','Items','Total Qty','Value']],
                            body: pd.top_categories.map(c=>[c.category||'—', c.items, c.total_qty, `$${parseFloat(c.value||0).toFixed(2)}`]),
                            headStyles:{fillColor:[10,14,39],textColor:[96,165,250]},
                            alternateRowStyles:{fillColor:[20,30,50]},
                            styles:{textColor:[200,210,220],fontSize:10},
                            margin:{left:14,right:14},
                        });
                    }
                } else {
                    doc.setTextColor(248,113,113); doc.setFontSize(12);
                    doc.text('Report data unavailable. Ensure the reporting service is running.', 14, y);
                }

                // Footer
                doc.setFontSize(8); doc.setTextColor(100,120,140);
                doc.text('Inventory Management System — Confidential', 105, 290, {align:'center'});

                doc.save(`inventory_report_${new Date().toISOString().split('T')[0]}.pdf`);
            } catch (e) { alert('PDF generation failed: ' + e.message); }
            finally { setPdfLoading(false); }
        };

        const getLogAction = (action) => {
            if ((action && action.includes('added')) || (action && action.includes('created'))) return 'var(--emerald-400)';
            if ((action && action.includes('deleted')) || (action && action.includes('removed'))) return 'var(--red-400)';
            if ((action && action.includes('updated')) || (action && action.includes('changed'))) return 'var(--amber-400)';
            return 'var(--blue-400)';
        };

        return (
            <>
                <div className="page-header"><h1 className="page-title">📋 Reports</h1><p className="page-subtitle">Activity logs and PDF report generation</p></div>

                <div className="tab-bar">
                    <button className={`tab-btn ${tab==='logs'?'active':''}`} onClick={()=>setTab('logs')}>📝 Activity Log</button>
                    <button className={`tab-btn ${tab==='pdf'?'active':''}`} onClick={()=>setTab('pdf')}>📄 PDF Reports</button>
                </div>

                {error && <div className="error-message">⚠️ {error}</div>}

                {tab==='logs' && (
                    <div className="report-card">
                        <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
                            <h3 className="report-section-title" style={{margin:0}}>Activity Log</h3>
                            <select className="form-input" style={{width:'auto',padding:'0.5rem 1rem'}} value={logDays} onChange={e=>{setLogDays(parseInt(e.target.value)); loadLogs(parseInt(e.target.value));}}>
                                <option value={7}>Last 7 days</option>
                                <option value={30}>Last 30 days</option>
                                <option value={90}>Last 90 days</option>
                                <option value={365}>Last year</option>
                            </select>
                            <button className="btn btn-secondary" style={{width:'auto',padding:'0.5rem 1rem',fontSize:'0.85rem'}} onClick={()=>loadLogs(logDays)}>↻ Refresh</button>
                        </div>

                        {logsLoading ? <div className="loading"><div className="spinner"/></div> : (
                            logs.length===0 ? <div style={{textAlign:'center',padding:'2rem',color:'var(--slate-300)'}}>No activity in this period</div>
                            : (
                                <div style={{maxHeight:'600px',overflowY:'auto'}}>
                                    {logs.map(log => (
                                        <div key={log.id} className="log-entry">
                                            <div className="log-entry-header">
                                                <span className="log-action" style={{color:getLogAction(log.action)}}>
                                                    {log.action}
                                                </span>
                                                <span className="log-meta">
                                                    <span className="log-user">{log.username || 'System'}</span>
                                                    {' — '}{log.full_name && <span style={{color:'var(--slate-300)'}}>{log.full_name} · </span>}
                                                    {new Date(log.created_at).toLocaleString()}
                                                </span>
                                            </div>
                                            {log.details && <div className="log-details">📌 {log.details}</div>}
                                        </div>
                                    ))}
                                </div>
                            )
                        )}
                    </div>
                )}

                {tab==='pdf' && (
                    <div style={{display:'grid',gap:'1.5rem',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))'}}>
                        <div className="report-card">
                            <div className="report-section-title">📊 Comprehensive Inventory Report</div>
                            <p style={{color:'var(--slate-300)',fontSize:'0.9rem',marginBottom:'1.5rem',lineHeight:'1.6'}}>
                                Generates a full PDF report with inventory overview, alert summary, user statistics, and top categories by value.
                            </p>
                            {reportLoading ? <div className="loading" style={{padding:'1rem'}}><div className="spinner" style={{width:30,height:30}}/></div>
                            : reportData && (
                                <div style={{background:'rgba(30,41,59,0.5)',borderRadius:'10px',padding:'1rem',marginBottom:'1rem',fontSize:'0.85rem'}}>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.5rem'}}>
                                        <div>📦 Items: <strong>{reportData.(inventory_overview && inventory_overview.total_items) || '—'}</strong></div>
                                        <div>🔔 Alerts: <strong>{reportData.(alerts_overview && alerts_overview.active) || '—'}</strong> active</div>
                                        <div>💰 Value: <strong>${parseFloat(reportData.(inventory_overview && inventory_overview.total_value)||0).toFixed(0)}</strong></div>
                                        <div>👥 Users: <strong>{reportData.(users_overview && users_overview.total_users) || '—'}</strong></div>
                                    </div>
                                </div>
                            )}
                            <button className="btn btn-primary" style={{width:'auto'}} onClick={generatePDF} disabled={pdfLoading}>
                                {pdfLoading ? '⏳ Generating…' : '⬇ Download PDF'}
                            </button>
                        </div>

                        <div className="report-card">
                            <div className="report-section-title">ℹ️ How to Use Reports</div>
                            <div style={{color:'var(--slate-300)',fontSize:'0.9rem',lineHeight:'1.8'}}>
                                <p>📝 <strong>Activity Log</strong> — Browse all system actions with user info and timestamps. Filter by time period.</p>
                                <p style={{marginTop:'0.75rem'}}>📄 <strong>PDF Export</strong> — Generate and download a formatted PDF containing full inventory analytics.</p>
                                <p style={{marginTop:'0.75rem'}}>⚙️ Reports are served by the <code style={{color:'var(--cyan-400)',fontFamily:'JetBrains Mono'}}>reporting_services.py</code> microservice on port <code style={{color:'var(--cyan-400)',fontFamily:'JetBrains Mono'}}>5002</code>.</p>
                            </div>
                        </div>
                    </div>
                )}
            </>
        );
    }

    /* ═══════════════════════════════════════
       SETTINGS PAGE
    ═══════════════════════════════════════ */
    function SettingsPage({ user }) {
        const [form, setForm] = useState({ full_name:user.full_name, email:user.email||'', phone:user.phone||'', password:'', confirmPassword:'' });
        const [file, setFile] = useState(null);
        const [photo, setPhoto] = useState(user.photo_filename ? `${API_BASE}/users/${user.id}/photo?t=${Date.now()}` : null);
        const fileRef = useRef(null);

        const handleSubmit = async (e) => {
            e.preventDefault();
            if (form.password && form.password !== form.confirmPassword) { alert('Passwords do not match'); return; }
            try {
                const upd = { full_name:form.full_name, email:form.email, phone:form.phone };
                if (form.password) upd.password = form.password;
                await api.updateUser(user.id, upd);
                if (file) { await api.uploadPhoto(user.id, file); setPhoto(`${API_BASE}/users/${user.id}/photo?t=${Date.now()}`); }
                alert('Settings saved!');
                setForm({...form, password:'', confirmPassword:''});
            } catch (err) { alert(err.message); }
        };

        const getInitials = n => n.split(' ').map(p=>p[0]).join('').toUpperCase();

        return (
            <>
                <div className="page-header"><h1 className="page-title">Settings</h1><p className="page-subtitle">Manage your account preferences</p></div>
                <div className="settings-section">
                    <div className="settings-header"><span style={{fontSize:'1.5rem'}}>👤</span><h3 className="settings-title">Profile Information</h3></div>
                    <form onSubmit={handleSubmit}>
                        <div className="photo-upload">
                            <div className="photo-preview">{photo ? <img src={photo} alt="Profile" /> : getInitials(user.full_name)}</div>
                            <input type="file" ref={fileRef} style={{display:'none'}} accept="image/*" onChange={e=>{const f=e.target.files[0];if(f){setFile(f);const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f);}}} />
                            <button type="button" className="btn btn-secondary" style={{width:'auto'}} onClick={()=>fileRef.current.click()}>Change Photo</button>
                        </div>
                        <div className="form-grid">
                            <div className="form-group"><label className="form-label">Full Name</label><input type="text" className="form-input" value={form.full_name} onChange={e=>setForm({...form,full_name:e.target.value})} required /></div>
                            <div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} /></div>
                            <div className="form-group"><label className="form-label">Phone</label><input type="tel" className="form-input" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="+1 (555) 123-4567" /></div>
                            <div className="form-group"><label className="form-label">Username</label><input type="text" className="form-input" value={user.username} disabled /></div>
                            <div className="form-group"><label className="form-label">Role</label><input type="text" className="form-input" value={user.role.toUpperCase()} disabled /></div>
                            {user.location_name && <div className="form-group"><label className="form-label">Location</label><input type="text" className="form-input" value={user.location_name} disabled /></div>}
                        </div>
                        <div className="settings-header" style={{marginTop:'2rem'}}><span style={{fontSize:'1.5rem'}}>🔒</span><h3 className="settings-title">Change Password</h3></div>
                        <div className="form-grid">
                            <div className="form-group"><label className="form-label">New Password</label><input type="password" className="form-input" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Leave blank to keep current" /></div>
                            <div className="form-group"><label className="form-label">Confirm Password</label><input type="password" className="form-input" value={form.confirmPassword} onChange={e=>setForm({...form,confirmPassword:e.target.value})} placeholder="Confirm new password" /></div>
                        </div>
                        <div className="action-buttons"><button type="submit" className="btn btn-primary" style={{width:'auto'}}>Save Changes</button></div>
                    </form>
                </div>
            </>
        );
    }

    /* ═══════════════════════════════════════
       USERS PAGE — admin can edit & delete
    ═══════════════════════════════════════ */
    function UsersPage({ currentUser }) {
        const [users, setUsers] = useState([]);
        const [locations, setLocations] = useState([]);
        const [showAddForm, setShowAddForm] = useState(false);
        const [editUser, setEditUser] = useState(null);
        const [newUser, setNewUser] = useState({ username:'', password:'', full_name:'', email:'', phone:'', role:'employee', location_id:null });

        const isAdmin = currentUser.role === 'admin';

        useEffect(() => { loadUsers(); api.getLocations().then(setLocations).catch(()=>{}); }, []);

        const loadUsers = async () => { try { setUsers(await api.getUsers()); } catch {} };

        const handleAdd = async (e) => {
            e.preventDefault();
            try { await api.createUser(newUser); setShowAddForm(false); setNewUser({username:'',password:'',full_name:'',email:'',phone:'',role:'employee',location_id:null}); loadUsers(); }
            catch (err) { alert(err.message); }
        };

        const handleDelete = async (u) => {
            if (!isAdmin) return;
            if (u.id === currentUser.id) { alert("You can't delete your own account."); return; }
            if (!confirm(`Delete user "${u.username}"? This cannot be undone.`)) return;
            try { await api.deleteUser(u.id); loadUsers(); } catch (err) { alert(err.message); }
        };

        const handleEditSave = async (e) => {
            e.preventDefault();
            if (editUser.password && editUser.password !== editUser.confirmPassword) { alert('Passwords do not match'); return; }
            try {
                const upd = { full_name:editUser.full_name, email:editUser.email, phone:editUser.phone, role:editUser.role, location_id:editUser.location_id||null };
                if (editUser.password) upd.password = editUser.password;
                await api.updateUser(editUser.id, upd);
                setEditUser(null); loadUsers();
            } catch (err) { alert(err.message); }
        };

        return (
            <>
                <div className="page-header"><h1 className="page-title">User Management</h1><p className="page-subtitle">Manage system users and permissions</p></div>

                {showAddForm ? (
                    <div className="settings-section">
                        <h3 style={{marginBottom:'1.5rem'}}>Create New User</h3>
                        <form onSubmit={handleAdd}>
                            <div className="form-grid">
                                <div className="form-group"><label className="form-label">Username *</label><input type="text" className="form-input" value={newUser.username} onChange={e=>setNewUser({...newUser,username:e.target.value})} required /></div>
                                <div className="form-group"><label className="form-label">Password *</label><input type="password" className="form-input" value={newUser.password} onChange={e=>setNewUser({...newUser,password:e.target.value})} required /></div>
                                <div className="form-group"><label className="form-label">Full Name *</label><input type="text" className="form-input" value={newUser.full_name} onChange={e=>setNewUser({...newUser,full_name:e.target.value})} required /></div>
                                <div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" value={newUser.email} onChange={e=>setNewUser({...newUser,email:e.target.value})} /></div>
                                <div className="form-group"><label className="form-label">Phone</label><input type="tel" className="form-input" value={newUser.phone} onChange={e=>setNewUser({...newUser,phone:e.target.value})} placeholder="+1 (555) 123-4567" /></div>
                                <div className="form-group"><label className="form-label">Role *</label>
                                    <select className="form-input" value={newUser.role} onChange={e=>setNewUser({...newUser,role:e.target.value})}>
                                        <option value="employee">Employee</option><option value="manager">Manager</option>
                                        {isAdmin && <option value="admin">Admin</option>}
                                    </select>
                                </div>
                                <div className="form-group"><label className="form-label">Location</label>
                                    <select className="form-input" value={newUser.location_id||''} onChange={e=>setNewUser({...newUser,location_id:e.target.value?parseInt(e.target.value):null})}>
                                        <option value="">No Location</option>
                                        {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="action-buttons">
                                <button type="submit" className="btn btn-primary" style={{width:'auto'}}>Create User</button>
                                <button type="button" className="btn btn-secondary" style={{width:'auto'}} onClick={()=>setShowAddForm(false)}>Cancel</button>
                            </div>
                        </form>
                    </div>
                ) : <button className="btn btn-primary" style={{width:'auto',marginBottom:'1.5rem'}} onClick={()=>setShowAddForm(true)}>+ Add New User</button>}

                <div className="table-container">
                    <div className="table-header"><h3 className="table-title">All Users</h3></div>
                    <table className="table">
                        <thead><tr><th>Username</th><th>Full Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Location</th><th>Last Login</th>{isAdmin && <th>Actions</th>}</tr></thead>
                        <tbody>
                            {users.map(u => (
                                <tr key={u.id}>
                                    <td style={{fontFamily:'JetBrains Mono,monospace',fontSize:'0.85rem'}}>{u.username}</td>
                                    <td style={{fontWeight:600}}>{u.full_name}</td>
                                    <td>{u.email||'—'}</td>
                                    <td style={{color:'var(--cyan-400)',fontWeight:600}}>{u.phone||'—'}</td>
                                    <td><span className={`badge ${u.role==='admin'?'danger':u.role==='manager'?'info':'success'}`}>{u.role.toUpperCase()}</span></td>
                                    <td>{u.location_name||'—'}</td>
                                    <td>{u.last_login?new Date(u.last_login).toLocaleDateString():'Never'}</td>
                                    {isAdmin && (
                                        <td>
                                            <div style={{display:'flex',gap:'0.5rem'}}>
                                                <button className="btn btn-warning btn-sm" onClick={()=>setEditUser({...u,password:'',confirmPassword:''})}>✏️ Edit</button>
                                                {u.id !== currentUser.id && <button className="btn btn-danger btn-sm" onClick={()=>handleDelete(u)}>🗑️</button>}
                                            </div>
                                        </td>
                                    )}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>

                {/* EDIT USER MODAL (admin only) */}
                {editUser && (
                    <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')setEditUser(null)}}>
                        <div className="modal">
                            <div className="modal-header">
                                <h2 className="modal-title">✏️ Edit User — {editUser.username}</h2>
                                <button className="modal-close" onClick={()=>setEditUser(null)}>×</button>
                            </div>
                            <form onSubmit={handleEditSave}>
                                <div className="form-grid">
                                    <div className="form-group"><label className="form-label">Full Name *</label><input type="text" className="form-input" value={editUser.full_name} onChange={e=>setEditUser({...editUser,full_name:e.target.value})} required /></div>
                                    <div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" value={editUser.email||''} onChange={e=>setEditUser({...editUser,email:e.target.value})} /></div>
                                    <div className="form-group"><label className="form-label">Phone</label><input type="tel" className="form-input" value={editUser.phone||''} onChange={e=>setEditUser({...editUser,phone:e.target.value})} /></div>
                                    <div className="form-group"><label className="form-label">Role *</label>
                                        <select className="form-input" value={editUser.role} onChange={e=>setEditUser({...editUser,role:e.target.value})}>
                                            <option value="employee">Employee</option><option value="manager">Manager</option><option value="admin">Admin</option>
                                        </select>
                                    </div>
                                    <div className="form-group"><label className="form-label">Location</label>
                                        <select className="form-input" value={editUser.location_id||''} onChange={e=>setEditUser({...editUser,location_id:e.target.value?parseInt(e.target.value):null})}>
                                            <option value="">No Location</option>
                                            {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="form-group"><label className="form-label">New Password</label><input type="password" className="form-input" value={editUser.password} onChange={e=>setEditUser({...editUser,password:e.target.value})} placeholder="Leave blank to keep current" /></div>
                                    <div className="form-group"><label className="form-label">Confirm Password</label><input type="password" className="form-input" value={editUser.confirmPassword} onChange={e=>setEditUser({...editUser,confirmPassword:e.target.value})} placeholder="Confirm new password" /></div>
                                </div>
                                <div className="action-buttons">
                                    <button type="submit" className="btn btn-primary" style={{width:'auto'}}>Save Changes</button>
                                    <button type="button" className="btn btn-secondary" style={{width:'auto'}} onClick={()=>setEditUser(null)}>Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
            </>
        );
    }

    /* ═══════════════════════════════════════
       DASHBOARD SHELL
    ═══════════════════════════════════════ */
    function Dashboard({ user, onLogout }) {
        const [collapsed, setCollapsed] = useState(false);
        const [page, setPage] = useState('dashboard');
        const [analytics, setAnalytics] = useState(null);
        const [items, setItems] = useState([]);
        const [alerts, setAlerts] = useState([]);
        const [loading, setLoading] = useState(true);

        const loadData = useCallback(async () => {
            try {
                const [ana, itms] = await Promise.all([api.getAnalytics(), api.getItems()]);
                setAnalytics(ana); setItems(itms);
            } catch (e) { console.error(e); }
            finally { setLoading(false); }
        }, []);

        const loadAlerts = useCallback(async () => {
            const data = await api.getAlerts();
            setAlerts(Array.isArray(data) ? data : []);
        }, []);

        useEffect(() => { loadData(); loadAlerts(); const t = setInterval(loadAlerts, 15000); return ()=>clearInterval(t); }, []);

        const handleResolveAlert = async (id) => {
            await api.resolveAlert(id);
            loadAlerts();
        };

        const refreshAll = () => { loadData(); loadAlerts(); };

        return (
            <div className="dashboard">
                <Sidebar user={user} currentPage={page} onNavigate={setPage} onLogout={onLogout} collapsed={collapsed} onToggle={()=>setCollapsed(!collapsed)} />
                <div className={`main-content ${collapsed?'sidebar-collapsed':''}`}>
                    {loading ? <div className="loading"><div className="spinner"/><p style={{marginTop:'1rem',color:'var(--slate-300)'}}>Loading…</p></div> : (
                        <>
                            {page==='dashboard' && <DashboardHome analytics={analytics} alerts={alerts} onResolveAlert={handleResolveAlert} />}
                            {page==='inventory' && <InventoryPage items={items} onRefresh={refreshAll} userRole={user.role} userLocation={user.location_id} />}
                            {page==='locations' && ['admin','manager'].includes(user.role) && <LocationsPage />}
                            {page==='contacts'  && ['admin','manager'].includes(user.role) && <ContactsPage />}
                            {page==='reports'   && ['admin','manager'].includes(user.role) && <ReportsPage />}
                            {page==='settings'  && <SettingsPage user={user} />}
                            {page==='users'     && ['admin','manager'].includes(user.role) && <UsersPage currentUser={user} />}
                        </>
                    )}
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════
       APP ROOT
    ═══════════════════════════════════════ */
    function App() {
        const [user, setUser] = useState(null);
        const [showWelcome, setShowWelcome] = useState(true);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
            const token = localStorage.getItem('token');
            const saved = localStorage.getItem('user');
            if (token && saved) { try { setUser(JSON.parse(saved)); } catch {} }
            setLoading(false);
        }, []);

        if (loading) return <div className="app-container"><div className="loading"><div className="spinner"/></div></div>;

        return (
            <div className="app-container">
                {!user ? <Login onLogin={u=>{setUser(u);setShowWelcome(true);}} />
                : showWelcome ? <WelcomePage user={user} onProceed={()=>setShowWelcome(false)} />
                : <Dashboard user={user} onLogout={()=>{localStorage.removeItem('token');localStorage.removeItem('user');setUser(null);setShowWelcome(true);}} />}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
