<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --navy-950: #0a0e27; --navy-900: #0f172a; --navy-800: #1e293b;
            --navy-700: #334155; --navy-600: #475569;
            --blue-500: #3b82f6; --blue-400: #60a5fa;
            --cyan-400: #22d3ee; --cyan-300: #67e8f9;
            --emerald-400: #34d399; --amber-400: #fbbf24; --red-400: #f87171;
            --slate-300: #cbd5e1; --slate-200: #e2e8f0;
            --sidebar-width: 280px; --sidebar-collapsed-width: 72px;
        }

        body {
            font-family: 'Archivo', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--navy-950) 0%, var(--navy-900) 50%, #0a1628 100%);
            min-height: 100vh; color: var(--slate-200); overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(34,211,238,0.08) 0%, transparent 50%);
            animation: backgroundShift 20s ease-in-out infinite; z-index: 0; pointer-events: none;
        }
        @keyframes backgroundShift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
        .app-container { position: relative; z-index: 1; }

        /* LOGIN */
        .login-container { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:2rem; }
        .login-box {
            background: rgba(15,23,42,0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(59,130,246,0.2); border-radius: 24px;
            padding: 3rem; width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .login-logo { text-align:center; margin-bottom:2rem; }
        .login-logo svg { width:64px; height:64px; margin-bottom:1rem; }
        .login-logo h1 {
            font-size:1.75rem; font-weight:700;
            background: linear-gradient(135deg, var(--blue-400) 0%, var(--cyan-300) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:0.5rem;
        }
        .login-logo p { font-size:0.875rem; color:var(--slate-300); font-family:'JetBrains Mono',monospace; }
        .form-group { margin-bottom:1.5rem; }
        .form-label { display:block; font-size:0.875rem; font-weight:600; color:var(--slate-300); margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:0.05em; }
        .form-input {
            width:100%; padding:0.875rem 1rem;
            background: rgba(30,41,59,0.6); border: 1px solid rgba(71,85,105,0.5);
            border-radius:12px; color:var(--slate-200); font-size:1rem;
            font-family:'Archivo',sans-serif; transition:all 0.3s ease;
        }
        .form-input:focus { outline:none; border-color:var(--blue-400); background:rgba(30,41,59,0.8); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        .form-input:disabled { opacity:0.6; cursor:not-allowed; }
        .btn {
            padding:0.875rem 1.5rem; border:none; border-radius:12px; font-size:1rem;
            font-weight:600; cursor:pointer; transition:all 0.3s ease;
            font-family:'Archivo',sans-serif; text-transform:uppercase; letter-spacing:0.05em;
        }
        .btn-primary { width:100%; background:linear-gradient(135deg,var(--blue-500) 0%,var(--cyan-400) 100%); color:white; box-shadow:0 10px 30px rgba(59,130,246,0.3); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 15px 40px rgba(59,130,246,0.4); }
        .btn-secondary { background:rgba(71,85,105,0.3); color:var(--slate-200); }
        .btn-secondary:hover { background:rgba(71,85,105,0.5); }
        .btn-danger { background:rgba(248,113,113,0.2); color:var(--red-400); border:1px solid rgba(248,113,113,0.4); }
        .btn-danger:hover { background:rgba(248,113,113,0.35); }
        .btn-success { background:rgba(52,211,153,0.2); color:var(--emerald-400); border:1px solid rgba(52,211,153,0.4); }
        .btn-success:hover { background:rgba(52,211,153,0.35); }
        .btn-sm { padding:0.4rem 0.8rem; font-size:0.8rem; }
        .btn-warning { background:rgba(251,191,36,0.2); color:var(--amber-400); border:1px solid rgba(251,191,36,0.4); }
        .btn-warning:hover { background:rgba(251,191,36,0.35); }
        .error-message {
            background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3);
            border-radius:12px; padding:0.875rem; margin-bottom:1.5rem; color:var(--red-400); font-size:0.875rem;
        }

        /* WELCOME */
        .welcome-container { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; text-align:center; }
        .welcome-box { background:rgba(15,23,42,0.8); backdrop-filter:blur(20px); border:1px solid rgba(59,130,246,0.2); border-radius:24px; padding:4rem; max-width:600px; animation:fadeInUp 0.8s ease-out; }
        .welcome-title { font-size:3rem; font-weight:700; background:linear-gradient(135deg,var(--blue-400) 0%,var(--cyan-300) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:1rem; }
        .welcome-subtitle { font-size:1.5rem; color:var(--slate-300); margin-bottom:3rem; }
        .welcome-btn { padding:1.25rem 3rem; font-size:1.125rem; background:linear-gradient(135deg,var(--blue-500) 0%,var(--cyan-400) 100%); color:white; border:none; border-radius:16px; cursor:pointer; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; box-shadow:0 15px 40px rgba(59,130,246,0.4); transition:all 0.3s ease; }
        .welcome-btn:hover { transform:translateY(-4px); box-shadow:0 20px 50px rgba(59,130,246,0.5); }

        /* DASHBOARD LAYOUT */
        .dashboard { display:flex; min-height:100vh; }

        /* SIDEBAR - NEW TOGGLE DESIGN */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(15,23,42,0.95); backdrop-filter:blur(20px);
            border-right: 1px solid rgba(59,130,246,0.2);
            position: fixed; height: 100vh; overflow-y:auto; overflow-x:hidden;
            transition: width 0.3s ease; z-index:1000;
            display:flex; flex-direction:column;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed-width); }

        /* NEW SIDEBAR TOGGLE - thin vertical tab on the edge */
        .sidebar-toggle {
            position: absolute;
            top: 50%;
            right: -14px;
            transform: translateY(-50%);
            width: 14px;
            height: 56px;
            background: linear-gradient(180deg, var(--blue-500) 0%, var(--cyan-400) 100%);
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            transition: all 0.3s ease;
            box-shadow: 3px 0 10px rgba(59,130,246,0.4);
        }
        .sidebar-toggle:hover {
            width: 18px;
            box-shadow: 4px 0 16px rgba(59,130,246,0.7);
        }
        .sidebar-toggle-lines {
            display: flex; flex-direction: column; gap: 4px; align-items: center;
        }
        .sidebar-toggle-lines span {
            display: block; width: 4px; height: 4px;
            background: white; border-radius: 50%;
            transition: all 0.3s ease;
        }
        .sidebar.collapsed .sidebar-toggle-lines span:nth-child(1) { transform: translateY(4px) rotate(45deg) scaleX(2.5); border-radius: 2px; width: 4px; height: 2px; }
        .sidebar.collapsed .sidebar-toggle-lines span:nth-child(2) { opacity: 0; }
        .sidebar.collapsed .sidebar-toggle-lines span:nth-child(3) { transform: translateY(-4px) rotate(-45deg) scaleX(2.5); border-radius: 2px; width: 4px; height: 2px; }

        .sidebar-header { padding:2rem; border-bottom:1px solid rgba(71,85,105,0.3); transition:padding 0.3s ease; }
        .sidebar.collapsed .sidebar-header { padding:2rem 0.5rem; text-align:center; }
        .sidebar-header h2 { font-size:1.25rem; font-weight:700; background:linear-gradient(135deg,var(--blue-400) 0%,var(--cyan-300) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; white-space:nowrap; overflow:hidden; transition:opacity 0.3s ease; }
        .sidebar.collapsed .sidebar-header h2 { opacity:0; height:0; }
        .sidebar-nav { padding:1.5rem 0; flex:1; }
        .nav-item { padding:0.875rem 1.5rem; display:flex; align-items:center; gap:1rem; cursor:pointer; transition:all 0.2s ease; border-left:3px solid transparent; color:var(--slate-300); font-weight:500; white-space:nowrap; }
        .sidebar.collapsed .nav-item { padding:0.875rem 0; justify-content:center; }
        .nav-item:hover { background:rgba(59,130,246,0.1); color:var(--cyan-300); }
        .nav-item.active { background:rgba(59,130,246,0.15); border-left-color:var(--cyan-400); color:var(--cyan-300); }
        .nav-icon { font-size:1.25rem; min-width:24px; text-align:center; }
        .nav-text { transition:opacity 0.3s ease; }
        .sidebar.collapsed .nav-text { opacity:0; width:0; overflow:hidden; }
        .sidebar-footer { padding:1.5rem; border-top:1px solid rgba(71,85,105,0.3); margin-top:auto; transition:padding 0.3s ease; }
        .sidebar.collapsed .sidebar-footer { padding:1rem 0.25rem; }
        .user-profile { display:flex; align-items:center; gap:1rem; padding:1rem; background:rgba(30,41,59,0.6); border-radius:12px; cursor:pointer; transition:all 0.2s ease; }
        .sidebar.collapsed .user-profile { flex-direction:column; gap:0.25rem; padding:0.5rem 0.25rem; }
        .user-profile:hover { background:rgba(30,41,59,0.8); }
        .user-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--blue-500) 0%,var(--cyan-400) 100%); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1rem; color:white; flex-shrink:0; overflow:hidden; }
        .user-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
        .user-info { flex:1; min-width:0; transition:opacity 0.3s ease; }
        .sidebar.collapsed .user-info { opacity:0; height:0; overflow:hidden; }
        .user-name { font-weight:600; font-size:0.875rem; margin-bottom:0.25rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .user-role { font-size:0.75rem; color:var(--slate-300); text-transform:uppercase; letter-spacing:0.05em; }

        /* MAIN CONTENT */
        .main-content { flex:1; margin-left:var(--sidebar-width); padding:2rem; transition:margin-left 0.3s ease; min-height:100vh; }
        .main-content.sidebar-collapsed { margin-left:var(--sidebar-collapsed-width); }
        .page-header { margin-bottom:2rem; }
        .page-title { font-size:2rem; font-weight:700; margin-bottom:0.5rem; background:linear-gradient(135deg,white 0%,var(--slate-200) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .page-subtitle { color:var(--slate-300); font-size:1rem; }

        /* STATS */
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1.5rem; margin-bottom:2rem; }
        .stat-card { background:rgba(15,23,42,0.6); backdrop-filter:blur(10px); border:1px solid rgba(59,130,246,0.2); border-radius:16px; padding:1.5rem; transition:all 0.3s ease; position:relative; overflow:hidden; }
        .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--blue-400) 0%,var(--cyan-400) 100%); }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,0.4); }
        .stat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
        .stat-label { font-size:0.875rem; color:var(--slate-300); text-transform:uppercase; letter-spacing:0.05em; font-weight:600; }
        .stat-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.25rem; }
        .stat-icon.blue { background:rgba(59,130,246,0.2); }
        .stat-icon.green { background:rgba(52,211,153,0.2); }
        .stat-icon.amber { background:rgba(251,191,36,0.2); }
        .stat-icon.red { background:rgba(248,113,113,0.2); }
        .stat-value { font-size:2.5rem; font-weight:700; margin-bottom:0.5rem; background:linear-gradient(135deg,white 0%,var(--slate-200) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

        /* CHARTS */
        .charts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(380px,1fr)); gap:1.5rem; margin-bottom:2rem; }
        .chart-card { background:rgba(15,23,42,0.6); backdrop-filter:blur(10px); border:1px solid rgba(59,130,246,0.2); border-radius:16px; padding:1.5rem; }
        .chart-header { margin-bottom:1.5rem; }
        .chart-title { font-size:1.125rem; font-weight:600; margin-bottom:0.25rem; }

        /* ALERTS */
        .alerts-section { margin-bottom:2rem; }
        .alert-item { background:rgba(15,23,42,0.6); border-left:4px solid var(--amber-400); border-radius:12px; padding:1rem 1.5rem; margin-bottom:0.75rem; display:flex; align-items:center; gap:1rem; }
        .alert-item.critical { border-left-color:var(--red-400); }
        .alert-icon { width:40px; height:40px; border-radius:50%; background:rgba(251,191,36,0.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1.25rem; }
        .alert-icon.critical { background:rgba(248,113,113,0.2); }
        .alert-content { flex:1; }
        .alert-title { font-weight:600; margin-bottom:0.25rem; }
        .alert-resolve-btn { background:rgba(52,211,153,0.15); border:1px solid rgba(52,211,153,0.3); color:var(--emerald-400); padding:0.4rem 0.8rem; border-radius:8px; cursor:pointer; font-size:0.8rem; font-weight:600; transition:all 0.2s; white-space:nowrap; }
        .alert-resolve-btn:hover { background:rgba(52,211,153,0.3); }

        /* TABLE */
        .table-container { background:rgba(15,23,42,0.6); backdrop-filter:blur(10px); border:1px solid rgba(59,130,246,0.2); border-radius:16px; overflow:hidden; margin-bottom:2rem; }
        .table-header { padding:1.5rem; border-bottom:1px solid rgba(71,85,105,0.3); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
        .table-title { font-size:1.25rem; font-weight:600; }
        .table-actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .table { width:100%; border-collapse:collapse; }
        .table thead { background:rgba(30,41,59,0.6); }
        .table th { padding:0.875rem 1rem; text-align:left; font-size:0.8rem; font-weight:600; color:var(--slate-300); text-transform:uppercase; letter-spacing:0.05em; }
        .table td { padding:0.875rem 1rem; border-top:1px solid rgba(71,85,105,0.2); font-size:0.9rem; }
        .table tbody tr { transition:background 0.2s ease; }
        .table tbody tr:hover { background:rgba(59,130,246,0.05); }
        .table tbody tr.expanded-parent { background:rgba(59,130,246,0.08); }
        .table tbody tr.location-row { background:rgba(30,41,59,0.4); }
        .table tbody tr.location-row td { padding:0.6rem 1rem; font-size:0.85rem; }

        .badge { display:inline-block; padding:0.25rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }
        .badge.success { background:rgba(52,211,153,0.2); color:var(--emerald-400); }
        .badge.warning { background:rgba(251,191,36,0.2); color:var(--amber-400); }
        .badge.danger { background:rgba(248,113,113,0.2); color:var(--red-400); }
        .badge.info { background:rgba(59,130,246,0.2); color:var(--blue-400); }

        /* QUANTITY CONTROLS */
        .quantity-controls { display:flex; align-items:center; gap:0.4rem; }
        .quantity-btn { width:28px; height:28px; border-radius:7px; border:1px solid rgba(59,130,246,0.3); background:rgba(59,130,246,0.1); color:var(--blue-400); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; font-weight:700; transition:all 0.2s ease; }
        .quantity-btn:hover { background:rgba(59,130,246,0.25); border-color:var(--blue-400); transform:scale(1.05); }
        .quantity-value { min-width:48px; text-align:center; font-weight:600; font-size:0.9rem; }

        /* SETTINGS */
        .settings-section { background:rgba(15,23,42,0.6); backdrop-filter:blur(10px); border:1px solid rgba(59,130,246,0.2); border-radius:16px; padding:2rem; margin-bottom:1.5rem; }
        .settings-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid rgba(71,85,105,0.3); }
        .settings-title { font-size:1.25rem; font-weight:600; }
        .photo-upload { text-align:center; margin-bottom:2rem; }
        .photo-preview { width:120px; height:120px; border-radius:50%; margin:0 auto 1rem; background:linear-gradient(135deg,var(--blue-500) 0%,var(--cyan-400) 100%); display:flex; align-items:center; justify-content:center; font-size:2.5rem; font-weight:700; color:white; border:3px solid rgba(59,130,246,0.3); overflow:hidden; }
        .photo-preview img { width:100%; height:100%; object-fit:cover; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1.5rem; }
        .action-buttons { display:flex; gap:1rem; margin-top:1.5rem; flex-wrap:wrap; }

        /* TABS */
        .tab-bar { display:flex; gap:0.5rem; margin-bottom:1.5rem; border-bottom:1px solid rgba(71,85,105,0.3); padding-bottom:0; }
        .tab-btn { padding:0.75rem 1.5rem; border:none; background:none; color:var(--slate-300); cursor:pointer; font-size:0.9rem; font-weight:600; font-family:'Archivo',sans-serif; border-bottom:2px solid transparent; transition:all 0.2s; text-transform:uppercase; letter-spacing:0.05em; }
        .tab-btn:hover { color:var(--cyan-300); }
        .tab-btn.active { color:var(--cyan-400); border-bottom-color:var(--cyan-400); }

        /* MODAL */
        .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:2000; animation:fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .modal { background:rgba(15,23,42,0.97); backdrop-filter:blur(20px); border:1px solid rgba(59,130,246,0.25); border-radius:24px; padding:2rem; max-width:680px; width:90%; max-height:88vh; overflow-y:auto; animation:slideUp 0.3s ease; }
        @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid rgba(71,85,105,0.3); }
        .modal-title { font-size:1.4rem; font-weight:700; }
        .modal-close { width:32px; height:32px; border-radius:50%; background:rgba(248,113,113,0.2); border:none; color:var(--red-400); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.25rem; transition:all 0.2s ease; }
        .modal-close:hover { background:rgba(248,113,113,0.35); transform:scale(1.1); }

        /* LOADING */
        .loading { text-align:center; padding:3rem; }
        .spinner { width:50px; height:50px; border:4px solid rgba(59,130,246,0.2); border-top-color:var(--blue-400); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto; }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* EXPAND BUTTON */
        .expand-btn { background:none; border:none; cursor:pointer; color:var(--blue-400); font-size:1.1rem; padding:0.2rem; transition:transform 0.2s; }
        .expand-btn.open { transform:rotate(90deg); }

        /* LOCATION SUB-ROW */
        .location-badge { background:rgba(34,211,238,0.15); color:var(--cyan-300); padding:0.2rem 0.6rem; border-radius:6px; font-size:0.8rem; font-weight:600; }
        .add-location-row { background:rgba(15,23,42,0.3) !important; }

        /* REPORT PAGE */
        .report-card { background:rgba(15,23,42,0.6); backdrop-filter:blur(10px); border:1px solid rgba(59,130,246,0.2); border-radius:16px; padding:1.5rem; margin-bottom:1.5rem; }
        .report-section-title { font-size:1.1rem; font-weight:600; color:var(--cyan-300); margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid rgba(71,85,105,0.3); }
        .log-entry { padding:0.75rem 1rem; border-radius:10px; margin-bottom:0.5rem; background:rgba(30,41,59,0.5); border-left:3px solid rgba(59,130,246,0.4); }
        .log-entry:hover { background:rgba(30,41,59,0.7); }
        .log-entry-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; }
        .log-action { font-weight:600; color:var(--slate-200); }
        .log-meta { font-size:0.8rem; color:var(--slate-300); }
        .log-details { font-size:0.85rem; color:var(--slate-300); margin-top:0.35rem; }
        .log-user { color:var(--cyan-400); font-weight:600; }

        /* RESPONSIVE */
        @media (max-width:768px) {
            .sidebar { width:var(--sidebar-collapsed-width); }
            .sidebar .nav-text, .sidebar .sidebar-header h2, .sidebar .user-info { opacity:0; width:0; height:0; overflow:hidden; }
            .main-content { margin-left:var(--sidebar-collapsed-width); }
            .stats-grid { grid-template-columns:1fr; }
            .charts-grid { grid-template-columns:1fr; }
        }

        .search-input { flex:1; padding:0.6rem 1rem; background:rgba(30,41,59,0.6); border:1px solid rgba(71,85,105,0.5); border-radius:10px; color:var(--slate-200); font-size:0.9rem; font-family:'Archivo',sans-serif; }
        .search-input:focus { outline:none; border-color:var(--blue-400); }

        select.form-input option { background:#1e293b; color:var(--slate-200); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE    = 'http://127.0.0.1:5000';
    const ALERT_BASE  = 'http://127.0.0.1:5001';
    const REPORT_BASE = 'http://127.0.0.1:5002';

    /* ── API helper ── */
    const api = {
        async request(base, endpoint, options = {}) {
            const token = localStorage.getItem('token');
            const headers = { 'Content-Type': 'application/json', ...(token && { Authorization: `Bearer ${token}` }), ...options.headers };
            const response = await fetch(`${base}${endpoint}`, { ...options, headers });
            if (response.status === 401) { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.reload(); }
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Request failed');
            return data;
        },
        req: (endpoint, options) => api.request(API_BASE, endpoint, options),

        /* Auth */
        login: (u, p) => api.req('/auth/login', { method:'POST', body:JSON.stringify({username:u,password:p}) }),
        getCurrentUser: () => api.req('/auth/me'),

        /* Locations */
        getLocations: () => api.req('/locations'),
        createLocation: (loc) => api.req('/locations', { method:'POST', body:JSON.stringify(loc) }),
        updateLocation: (id, data) => api.req(`/locations/${id}`, { method:'PUT', body:JSON.stringify(data) }),

        /* Items */
        getItems: () => api.req('/items'),
        getLowStock: () => api.req('/items/low-stock'),
        addItem: (item) => api.req('/items', { method:'POST', body:JSON.stringify(item) }),
        updateItem: (id, data) => api.req(`/items/${id}`, { method:'PUT', body:JSON.stringify(data) }),
        deleteItem: (id) => api.req(`/items/${id}`, { method:'DELETE' }),

        /* Item-location stock (multi-warehouse) */
        getItemStocks: (id) => api.req(`/items/${id}/locations`),
        setItemStock: (itemId, locId, qty) => api.req(`/items/${itemId}/locations/${locId}`, { method:'PUT', body:JSON.stringify({quantity:qty}) }),
        addItemToLocation: (itemId, locId, qty) => api.req(`/items/${itemId}/locations`, { method:'POST', body:JSON.stringify({location_id:locId,quantity:qty}) }),
        removeItemFromLocation: (itemId, locId) => api.req(`/items/${itemId}/locations/${locId}`, { method:'DELETE' }),

        /* Users */
        getUsers: () => api.req('/users'),
        createUser: (u) => api.req('/users', { method:'POST', body:JSON.stringify(u) }),
        updateUser: (id, data) => api.req(`/users/${id}`, { method:'PUT', body:JSON.stringify(data) }),
        deleteUser: (id) => api.req(`/users/${id}`, { method:'DELETE' }),
        uploadPhoto: async (userId, file) => {
            const token = localStorage.getItem('token');
            const fd = new FormData(); fd.append('photo', file);
            const r = await fetch(`${API_BASE}/users/${userId}/photo`, { method:'POST', headers:{ Authorization:`Bearer ${token}` }, body:fd });
            if (!r.ok) throw new Error('Photo upload failed'); return r.json();
        },

        /* Contacts */
        getContacts: () => api.req('/contacts'),

        /* Analytics */
        getAnalytics: () => api.req('/analytics/summary'),

        /* Alert microservice */
        getAlerts: async () => { try { const r = await fetch(`${ALERT_BASE}/alerts`); if (!r.ok) return []; return r.json(); } catch { return []; } },
        resolveAlert: async (id) => { try { const r = await fetch(`${ALERT_BASE}/alerts/${id}/resolve`, {method:'POST'}); return r.json(); } catch { return null; } },

        /* Reports */
        getActivityLog: (days=30) => api.request(REPORT_BASE, `/reports/activity-log?days=${days}`),
        getComprehensiveReport: () => api.request(REPORT_BASE, '/reports/comprehensive'),
        getInventorySummary: () => api.request(REPORT_BASE, '/reports/inventory-summary'),
    };

    /* ═══════════════════════════════════════
       LOGIN
    ═══════════════════════════════════════ */
    function Login({ onLogin }) {
        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [error, setError] = useState('');
        const [loading, setLoading] = useState(false);
        const handleSubmit = async (e) => {
            e.preventDefault(); setError(''); setLoading(true);
            try { const data = await api.login(username, password); localStorage.setItem('token', data.token); localStorage.setItem('user', JSON.stringify(data.user)); onLogin(data.user); }
            catch (err) { setError(err.message || 'Login failed'); }
            finally { setLoading(false); }
        };
        return (
            <div className="login-container">
                <div className="login-box">
                    <div className="login-logo">
                        <svg viewBox="0 0 24 24" fill="none"><path d="M20 7L12 3L4 7M20 7L12 11M20 7V17L12 21M12 11L4 7M12 11V21M4 7V17L12 21" stroke="url(#g1)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><defs><linearGradient id="g1" x1="4" y1="3" x2="20" y2="21" gradientUnits="userSpaceOnUse"><stop stopColor="#3b82f6"/><stop offset="1" stopColor="#22d3ee"/></linearGradient></defs></svg>
                        <h1>Inventory System</h1><p>// Manager Portal</p>
                    </div>
                    {error && <div className="error-message">{error}</div>}
                    <form onSubmit={handleSubmit}>
                        <div className="form-group"><label className="form-label">Username</label><input type="text" className="form-input" value={username} onChange={e=>setUsername(e.target.value)} required autoFocus /></div>
                        <div className="form-group"><label className="form-label">Password</label><input type="password" className="form-input" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                        <button type="submit" className="btn btn-primary" disabled={loading}>{loading ? 'Signing In…' : 'Sign In'}</button>
                    </form>
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════
       WELCOME PAGE
    ═══════════════════════════════════════ */
    function WelcomePage({ user, onProceed }) {
        return (
            <div className="welcome-container">
                <div className="welcome-box">
                    <h1 className="welcome-title">Hello,</h1>
                    <h2 className="welcome-subtitle">{user.full_name}!</h2>
                    <p style={{color:'var(--slate-300)',marginBottom:'3rem',fontSize:'1.125rem'}}>Welcome to the Inventory Management System</p>
                    <button className="welcome-btn" onClick={onProceed}>Go to Dashboard →</button>
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════
       SIDEBAR (new toggle design)
    ═══════════════════════════════════════ */
    function Sidebar({ user, currentPage, onNavigate, onLogout, collapsed, onToggle }) {
        const getInitials = n => n.split(' ').map(p=>p[0]).join('').toUpperCase();
        const isManager = ['admin','manager'].includes(user.role);
        return (
            <div className={`sidebar ${collapsed?'collapsed':''}`}>
                {/* NEW TOGGLE — thin vertical tab */}
                <div className="sidebar-toggle" onClick={onToggle} title={collapsed?'Expand sidebar':'Collapse sidebar'}>
                    <div className="sidebar-toggle-lines">
                        <span/><span/><span/>
                    </div>
                </div>

                <div className="sidebar-header"><h2>📦 Inventory Pro</h2></div>
                <div className="sidebar-nav">
                    {[
                        { id:'dashboard', icon:'📊', label:'Dashboard' },
                        { id:'inventory', icon:'📦', label:'Inventory' },
                        ...(isManager ? [
                            { id:'locations', icon:'📍', label:'Locations' },
                            { id:'contacts',  icon:'📞', label:'Contacts' },
                            { id:'users',     icon:'👥', label:'Users' },
                            { id:'reports',   icon:'📋', label:'Reports' },
                        ] : []),
                        { id:'settings', icon:'⚙️', label:'Settings' },
                    ].map(item => (
                        <div key={item.id} className={`nav-item ${currentPage===item.id?'active':''}`} onClick={()=>onNavigate(item.id)}>
                            <span className="nav-icon">{item.icon}</span>
                            <span className="nav-text">{item.label}</span>
                        </div>
                    ))}
                    <div className="nav-item" onClick={onLogout}><span className="nav-icon">🚪</span><span className="nav-text">Logout</span></div>
                </div>
                <div className="sidebar-footer">
                    <div className="user-profile">
                        <div className="user-avatar">
                            {user.photo_filename ? <img src={`${API_BASE}/users/${user.id}/photo`} alt="avatar" onError={e=>{e.target.style.display='none'}} /> : getInitials(user.full_name)}
                        </div>
                        <div className="user-info">
                            <div className="user-name">{user.full_name}</div>
                            <div className="user-role">{user.role}</div>
                            {user.location_name && <div style={{fontSize:'0.7rem',color:'var(--cyan-400)',marginTop:'0.2rem'}}>📍 {user.location_name}</div>}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    /* ═══════════════════════════════════════
       DASHBOARD HOME (alerts from microservice)
    ═══════════════════════════════════════ */
    function DashboardHome({ analytics, alerts, onResolveAlert }) {
        const chartRef = useRef(null);
        const catRef   = useRef(null);
        const chartsCreated = useRef(false);

        useEffect(() => {
            if (analytics && !chartsCreated.current) { createCharts(); chartsCreated.current = true; }
        }, [analytics]);

        const createCharts = () => {
            if (chartRef.current) {
                const ctx = chartRef.current.getContext('2d');
                new Chart(ctx, { type:'line', data:{
                    labels:['Day 1','Day 2','Day 3','Day 4','Day 5','Day 6','Today'],
                    datasets:[{label:'Items',data:[analytics.total_items-15,analytics.total_items-10,analytics.total_items-5,analytics.total_items,analytics.total_items+3,analytics.total_items+5,analytics.total_items],borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',tension:0.4,fill:true}]},
                    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(71,85,105,0.2)'},ticks:{color:'#cbd5e1'}},x:{grid:{display:false},ticks:{color:'#cbd5e1'}}}}
                });
            }
            if (catRef.current && analytics.categories) {
                const ctx = catRef.current.getContext('2d');
                new Chart(ctx, { type:'doughnut', data:{
                    labels:analytics.categories.map(c=>c.category||'Other'),
                    datasets:[{data:analytics.categories.map(c=>c.count),backgroundColor:['#3b82f6','#22d3ee','#34d399','#fbbf24','#f87171','#a78bfa']}]},
                    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#cbd5e1'}}}}
                });
            }
        };

        if (!analytics) return <div className="loading"><div className="spinner"/></div>;

        return (
            <>
                <div className="page-header">
                    <h1 className="page-title">Dashboard Overview</h1>
                    <p className="page-subtitle">Real-time inventory insights and analytics</p>
                </div>
                <div className="stats-grid">
                    {[
                        {label:'Total Items',   value:analytics.total_items,       icon:'📦', cls:'blue'},
                        {label:'Low Stock',     value:analytics.low_stock_count,   icon:'⚠️', cls:'amber'},
                        {label:'Out of Stock',  value:analytics.out_of_stock,      icon:'❌', cls:'red'},
                        {label:'Total Value',   value:`$${(analytics.inventory_value||0).toFixed(0)}`, icon:'💰', cls:'green'},
                        {label:'Active Alerts', value:alerts.length,               icon:'🔔', cls:'amber'},
                    ].map(s => (
                        <div key={s.label} className="stat-card">
                            <div className="stat-header"><span className="stat-label">{s.label}</span><div className={`stat-icon ${s.cls}`}>{s.icon}</div></div>
                            <div className="stat-value">{s.value}</div>
                        </div>
                    ))}
                </div>
                <div className="charts-grid">
                    <div className="chart-card"><div className="chart-header"><h3 className="chart-title">Inventory Trend</h3></div><div style={{height:'280px'}}><canvas ref={chartRef}/></div></div>
                    <div className="chart-card"><div className="chart-header"><h3 className="chart-title">Items by Category</h3></div><div style={{height:'280px'}}><canvas ref={catRef}/></div></div>
                </div>
                {alerts.length > 0 && (
                    <div className="alerts-section">
                        <h2 style={{marginBottom:'1rem'}}>🔔 Active Alerts ({alerts.length})</h2>
                        {alerts.map(a => (
                            <div key={a.id} className={`alert-item ${a.alert_type==='out_of_stock'?'critical':''}`}>
                                <div className={`alert-icon ${a.alert_type==='out_of_stock'?'critical':''}`}>{a.alert_type==='out_of_stock'?'❌':'⚠️'}</div>
                                <div className="alert-content">
                                    <div className="alert-title">{a.item_name || a.message}</div>
                                    <div style={{fontSize:'0.875rem',color:'var(--slate-300)'}}>
                                        {a.item_name && `Qty: ${a.quantity} | Min: ${a.min_quantity}`}
                                        {a.category && ` | ${a.category}`}
                                    </div>
                                </div>
                                <button className="alert-resolve-btn" onClick={()=>onResolveAlert(a.id)}>✓ Resolve</button>
                            </div>
                        ))}
                    </div>
                )}
            </>
        );
    }

    /* ═══════════════════════════════════════
       INVENTORY PAGE — multi-warehouse
    ═══════════════════════════════════════ */
    function InventoryPage({ items, onRefresh, userRole, userLocation }) {
        const [locations, setLocations] = useState([]);
        const [showAddForm, setShowAddForm] = useState(false);
        const [expandedItem, setExpandedItem] = useState(null);
        const [itemStocks, setItemStocks] = useState({});      // { itemId: [{location_id, location_name, quantity}] }
        const [editModal, setEditModal] = useState(null);       // item being edited
        const [search, setSearch] = useState('');
        const [newItem, setNewItem] = useState({ name:'', sku:'', quantity:0, min_quantity:10, price:0, category:'', location_id: userLocation||null });
        const [addStockModal, setAddStockModal] = useState(null); // {itemId}

        useEffect(() => { loadLocations(); }, []);

        const loadLocations = async () => {
            try { const d = await api.getLocations(); setLocations(d); } catch {}
        };

        const loadItemStocks = async (itemId) => {
            try {
                const d = await api.getItemStocks(itemId);
                setItemStocks(prev => ({ ...prev, [itemId]: d }));
            } catch (e) { console.error('loadItemStocks error', e); }
        };

        const toggleExpand = (item) => {
            if (expandedItem === item.id) { setExpandedItem(null); return; }
            setExpandedItem(item.id);
            if (!itemStocks[item.id]) loadItemStocks(item.id);
        };

        const handleAdd = async (e) => {
            e.preventDefault();
            try { await api.addItem(newItem); setShowAddForm(false); setNewItem({name:'',sku:'',quantity:0,min_quantity:10,price:0,category:'',location_id:userLocation||null}); onRefresh(); }
            catch (err) { alert(err.message); }
        };

        const handleDelete = async (id) => {
            if (!confirm('Delete this item?')) return;
            try { await api.deleteItem(id); if (expandedItem===id) setExpandedItem(null); onRefresh(); } catch (err) { alert(err.message); }
        };

        const handleQuantityChange = async (item, delta) => {
            const newQty = Math.max(0, item.quantity + delta);
            try { await api.updateItem(item.id, {quantity:newQty}); onRefresh(); } catch (err) { alert(err.message); }
        };

        const handleLocationQtyChange = async (itemId, locId, delta, currentQty) => {
            const newQty = Math.max(0, currentQty + delta);
            try { await api.setItemStock(itemId, locId, newQty); await loadItemStocks(itemId); onRefresh(); } catch (err) { alert(err.message); }
        };

        const handleRemoveFromLocation = async (itemId, locId) => {
            if (!confirm('Remove this item from this location?')) return;
            try { await api.removeItemFromLocation(itemId, locId); await loadItemStocks(itemId); onRefresh(); } catch (err) { alert(err.message); }
        };

        const openEditModal = async (item) => {
            if (!itemStocks[item.id]) await loadItemStocks(item.id);
            setEditModal({ ...item });
        };

        const handleEditSave = async (e) => {
            e.preventDefault();
            try {
                await api.updateItem(editModal.id, { name:editModal.name, sku:editModal.sku, price:editModal.price, min_quantity:editModal.min_quantity, category:editModal.category });
                setEditModal(null); onRefresh();
            } catch (err) { alert(err.message); }
        };

        const filteredItems = items.filter(i =>
            i.name.toLowerCase().includes(search.toLowerCase()) ||
            (i.sku||'').toLowerCase().includes(search.toLowerCase()) ||
            (i.category||'').toLowerCase().includes(search.toLowerCase())
        );

        return (
            <>
                <div className="page-header">
                    <h1 className="page-title">Inventory Management</h1>
                    <p className="page-subtitle">{userRole==='employee' ? 'Managing items at your location' : 'All items across all warehouses'}</p>
                </div>

                {showAddForm ? (
                    <div className="settings-section">
                        <h3 style={{marginBottom:'1.5rem'}}>➕ Add New Item</h3>
                        <form onSubmit={handleAdd}>
                            <div className="form-grid">
                                <div className="form-group"><label className="form-label">Item Name *</label><input type="text" className="form-input" value={newItem.name} onChange={e=>setNewItem({...newItem,name:e.target.value})} required /></div>
                                <div className="form-group"><label className="form-label">SKU</label><input type="text" className="form-input" value={newItem.sku} onChange={e=>setNewItem({...newItem,sku:e.target.value})} /></div>
                                <div className="form-group"><label className="form-label">Initial Qty</label><input type="number" className="form-input" value={newItem.quantity} onChange={e=>setNewItem({...newItem,quantity:parseInt(e.target.value)||0})} /></div>
                                <div className="form-group"><label className="form-label">Min Quantity *</label><input type="number" className="form-input" value={newItem.min_quantity} onChange={e=>setNewItem({...newItem,min_quantity:parseInt(e.target.value)||0})} required /></div>
                                <div className="form-group"><label className="form-label">Price</label><input type="number" step="0.01" className="form-input" value={newItem.price} onChange={e=>setNewItem({...newItem,price:parseFloat(e.target.value)||0})} /></div>
                                <div className="form-group"><label className="form-label">Category</label><input type="text" className="form-input" value={newItem.category} onChange={e=>setNewItem({...newItem,category:e.target.value})} /></div>
                                {['admin','manager'].includes(userRole) && (
                                    <div className="form-group"><label className="form-label">Initial Location</label>
                                        <select className="form-input" value={newItem.location_id||''} onChange={e=>setNewItem({...newItem,location_id:e.target.value?parseInt(e.target.value):null})}>
                                            <option value="">No Location</option>
                                            {locations.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                                        </select>
                                    </div>
                                )}
                            </div>
                            <div className="action-buttons">
                                <button type="submit" className="btn btn-primary" style={{width:'auto'}}>Add Item</button>
                                <button type="button" className="btn btn-secondary" style={{width:'auto'}} onClick={()=>setShowAddForm(false)}>Cancel</button>
                            </div>
                        </form>
                    </div>
                ) : (
                    <div style={{display:'flex',gap:'1rem',marginBottom:'1.5rem',flexWrap:'wrap'}}>
                        <button className="btn btn-primary" style={{width:'auto'}} onClick={()=>setShowAddForm(true)}>+ Add New Item</button>
                        <input className="search-input" placeholder="🔍  Search by name, SKU, category…" value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:'360px'}} />
                    </div>
                )}

                <div className="table-container">
                    <div className="table-header">
                        <h3 className="table-title">All Items <span style={{fontSize:'0.9rem',color:'var(--slate-300)',fontWeight:400}}>({filteredItems.length})</span></h3>
                        <span style={{fontSize:'0.8rem',color:'var(--cyan-400)'}}>▶ Click row arrow to manage warehouse quantities</span>
                    </div>
                    <table className="table">
                        <thead>
                            <tr>
                                <th style={{width:'36px'}}></th>
                                <th>Name</th><th>SKU</th><th>Total Qty</th>
                                <th>Min Qty</th><th>Price</th><th>Category</th>
                                <th>Status</th><th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {filteredItems.length === 0 ? (
                                <tr><td colSpan="9" style={{textAlign:'center',padding:'2rem',color:'var(--slate-300)'}}>No items found</td></tr>
                            ) : filteredItems.map(item => (
                                <React.Fragment key={item.id}>
                                    <tr className={expandedItem===item.id?'expanded-parent':''}>
                                        <td>
                                            <button className={`expand-btn ${expandedItem===item.id?'open':''}`} onClick={()=>toggleExpand(item)} title="Manage warehouse locations">▶</button>
                                        </td>
                                        <td style={{fontWeight:600}}>{item.name}</td>
                                        <td style={{fontFamily:'JetBrains Mono,monospace',fontSize:'0.8rem'}}>{item.sku||'—'}</td>
                                        <td>
                                            <div className="quantity-controls">
                                                <div className="quantity-btn" onClick={()=>handleQuantityChange(item,-1)}>−</div>
                                                <span className="quantity-value">{item.quantity}</span>
                                                <div className="quantity-btn" onClick={()=>handleQuantityChange(item,1)}>+</div>
                                            </div>
                                        </td>
                                        <td>{item.min_quantity}</td>
                                        <td>${parseFloat(item.price||0).toFixed(2)}</td>
                                        <td>{item.category||'—'}</td>
                                        <td>
                                            {item.quantity===0 ? <span className="badge danger">Out of Stock</span>
                                                : item.quantity < item.min_quantity ? <span className="badge warning">Low Stock</span>
                                                : <span className="badge success">In Stock</span>}
                                        </td>
                                        <td>
                                            <div style={{display:'flex',gap:'0.5rem',flexWrap:'wrap'}}>
                                                <button className="btn btn-warning btn-sm" onClick={()=>openEditModal(item)}>✏️ Edit</button>
                                                <button className="btn btn-danger btn-sm" onClick={()=>handleDelete(item.id)}>🗑️</button>
                                            </div>
                                        </td>
                                    </tr>

                                    {/* Expanded: per-warehouse stocks */}
                                    {expandedItem===item.id && (
                                        <>
                                            <tr><td colSpan="9" style={{padding:'0 1rem 0.25rem 3rem',background:'rgba(15,23,42,0.3)'}}>

                                                    <td></td>
                                                    <td colSpan="2" style={{paddingLeft:'2rem'}}>
                                                        <span className="location-badge">📍 {stock.location_name||`Location #${stock.location_id}`}</span>
                                                    </td>
                                                    <td>
                                                        <div className="quantity-controls">
                                                            <div className="quantity-btn" onClick={()=>handleLocationQtyChange(item.id,stock.location_id,-1,stock.quantity)}>−</div>

                                                    <td>
                                                        <button className="btn btn-danger btn-sm" onClick={()=>handleRemoveFromLocation(item.id,stock.location_id)}>Remove</button>

                                                <td colSpan="8" style={{paddingLeft:'2rem'}}>
                                                    <AddToLocationRow
                                                        itemId={item.id}
                                                        locations={locations}

                    </table>

                {/* EDIT ITEM MODAL */}
                {editModal && (
                    <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')setEditModal(null)}}>
                        <div className="modal">
                            <div className="modal-header">
                                <h2 className="modal-title">✏️ Edit Item</h2>
                                <button className="modal-close" onClick={()=>setEditModal(null)}>×</button>
                            </div>
                            <form onSubmit={handleEditSave}>
                                <div className="form-grid">
                                    <div className="form-group"><label className="form-label">Item Name *</label><input type="text" className="form-input" value={editModal.name} onChange={e=>setEditModal({...editModal,name:e.target.value})} required /></div>
                                    <div className="form-group"><label className="form-label">SKU</label><input type="text" className="form-input" value={editModal.sku||''} onChange={e=>setEditModal({...editModal,sku:e.target.value})} /></div>
                                    <div className="form-group"><label className="form-label">Min Quantity</label><input type="number" className="form-input" value={editModal.min_quantity} onChange={e=>setEditModal({...editModal,min_quantity:parseInt(e.target.value)||0})} /></div>
                                    <div className="form-group"><label className="form-label">Price</label><input type="number" step="0.01" className="form-input" value={editModal.price||0} onChange={e=>setEditModal({...editModal,price:parseFloat(e.target.value)||0})} /></div>
                                    <div className="form-group"><label className="form-label">Category</label><input type="text" className="form-input" value={editModal.category||''} onChange={e=>setEditModal({...editModal,category:e.target.value})} /></div>
                                </div>

                                {/* Per-warehouse quantities in modal */}
                                {itemStocks[editModal.id] && itemStocks[editModal.id].length > 0 && (
                                    <div style={{marginTop:'1.5rem'}}>
                                        <div className="report-section-title">📍 Warehouse Quantities</div>
                                        {itemStocks[editModal.id].map(stock => (
                                            <div key={stock.location_id} style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'0.75rem',padding:'0.75rem',background:'rgba(30,41,59,0.5)',borderRadius:'10px'}}>
                                                <span style={{flex:1,color:'var(--cyan-300)',fontWeight:600}}>📍 {stock.location_name}</span>
                                                <div className="quantity-controls">
                                                    <div className="quantity-btn" onClick={()=>handleLocationQtyChange(editModal.id,stock.location_id,-1,stock.quantity)}>−</div>
                                                    <span className="quantity-value">{stock.quantity}</span>
                                                    <div className="quantity-btn" onClick={()=>handleLocationQtyChange(editModal.id,stock.location_id,1,stock.quantity)}>+</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="action-buttons">
                                    <button type="submit" className="btn btn-primary" style={{width:'auto'}}>Save Changes</button>
                                    <button type="button" className="btn btn-secondary" style={{width:'auto'}} onClick={()=>setEditModal(null)}>Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
            </>
        );
    }

    function AddToLocationRow({ itemId, locations, existingLocations, onAdd }) {
        const [selLoc, setSelLoc] = useState('');
        const [qty, setQty] = useState(0);
        const [adding, setAdding] = useState(false);

        const available = locations.filter(l => !existingLocations.includes(l.id));
        if (available.length === 0) return <span style={{fontSize:'0.8rem',color:'var(--slate-300)',fontStyle:'italic'}}>✓ All locations assigned</span>;

        const submit = async () => {
            if (!selLoc) return;
            setAdding(true);
            try { await onAdd(parseInt(selLoc), parseInt(qty)||0); setSelLoc(''); setQty(0); }
            catch (err) { alert(err.message); }
            finally { setAdding(false); }
        };

        return (
            <div style={{display:'flex',alignItems:'center',gap:'0.75rem',flexWrap:'wrap'}}>
                <span style={{fontSize:'0.8rem',color:'var(--slate-300)'}}>+ Add to:</span>
                <select className="form-input" style={{width:'auto',padding:'0.4rem 0.8rem',fontSize:'0.85rem'}} value={selLoc} onChange={e=>setSelLoc(e.target.value)}>
                    <option value="">Select warehouse…</option>
                    {available.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
                </select>
                <input type="number" className="form-input" placeholder="Qty" style={{width:'80px',padding:'0.4rem 0.6rem',fontSize:'0.85rem'}} value={qty} onChange={e=>setQty(e.target.value)} min="0" />
                <button className="btn btn-success btn-sm" onClick={submit} disabled={adding||!selLoc}>{adding?'…':'Add'}</button>
            </div>
        );
    }
